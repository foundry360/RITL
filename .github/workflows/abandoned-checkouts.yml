name: Abandoned checkout reminders

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Send 3-day abandoned checkout emails
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: https://www.getritul.com
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is not configured in GitHub repository secrets"
            exit 1
          fi
          curl --fail-with-body -sS \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/abandoned-checkouts"
