name: Sync fulfillment

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Poll Roastify and send stage emails
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: https://www.getritul.com
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is not configured in GitHub repository secrets"
            exit 1
          fi
          curl --fail-with-body -sS \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/sync-fulfillment"
